info:
  contact:
    email: 25076778@qq.com
    name: API Support
    url: http://www.swagger.io/support
  description: Gin API 文档
  termsOfService: http://swagger.io/terms/
  title: Gin Swagger API
  version: "2.0"
paths:
  /api/v1/article:
    get:
      description: 文章列表
      parameters:
      - description: 认证Token
        in: header
        name: token
        required: true
        type: string
      - description: 页码
        in: query
        name: page
        required: true
        type: string
      - description: 分页大小
        in: query
        name: pageSize
        required: true
        type: string
      - description: 是否不分页
        in: query
        name: notPage
        required: true
        type: string
      responses:
        "200":
          description: 成功
          schema:
            allOf:
            - $ref: '#/definitions/errcode.SuccessResponse'
            - properties:
                data:
                  allOf:
                  - $ref: '#/definitions/request.PageData'
                  - properties:
                      list:
                        items:
                          $ref: '#/definitions/model.Article'
                        type: array
                    type: object
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/errcode.ArgsErrorResponse'
        "500":
          description: 系统错误
          schema:
            $ref: '#/definitions/errcode.SystemErrorResponse'
      summary: 列表
      tags:
      - 文章管理
    post:
      description: 文章创建
      parameters:
      - description: 认证Token
        in: header
        name: token
        required: true
        type: string
      - description: 创建参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/request.ArticleCreate'
      responses:
        "200":
          description: 成功
          schema:
            allOf:
            - $ref: '#/definitions/errcode.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.Article'
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/errcode.ArgsErrorResponse'
        "500":
          description: 系统错误
          schema:
            $ref: '#/definitions/errcode.SystemErrorResponse'
      summary: 创建
      tags:
      - 文章管理
  /api/v1/article/{id}:
    delete:
      description: 文章删除
      parameters:
      - description: 认证Token
        in: header
        name: token
        required: true
        type: string
      - description: ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/errcode.SuccessResponse'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/errcode.ArgsErrorResponse'
        "500":
          description: 系统错误
          schema:
            $ref: '#/definitions/errcode.SystemErrorResponse'
      summary: 删除
      tags:
      - 文章管理
    get:
      description: 文章详情
      parameters:
      - description: 认证Token
        in: header
        name: token
        required: true
        type: string
      - description: ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: 成功
          schema:
            allOf:
            - $ref: '#/definitions/errcode.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.Article'
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/errcode.ArgsErrorResponse'
        "500":
          description: 系统错误
          schema:
            $ref: '#/definitions/errcode.SystemErrorResponse'
      summary: 详情
      tags:
      - 文章管理
    put:
      description: 文章更新
      parameters:
      - description: 认证Token
        in: header
        name: token
        required: true
        type: string
      - description: ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/request.ArticleUpdate'
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/errcode.SuccessResponse'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/errcode.ArgsErrorResponse'
        "500":
          description: 系统错误
          schema:
            $ref: '#/definitions/errcode.SystemErrorResponse'
      summary: 更新
      tags:
      - 文章管理
  /api/v1/captcha:
    get:
      consumes:
      - application/json
      description: 获取验证码
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回" Example({"code":0,"msg":"Success","data":[]})
          schema:
            allOf:
            - $ref: '#/definitions/errcode.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/v1.CaptchaResponse'
              type: object
        "500":
          description: 系统错误" Example({"code":500,"msg":"系统错误","data":[]})
          schema:
            $ref: '#/definitions/errcode.SystemErrorResponse'
      summary: 获取验证码
      tags:
      - 登录相关
    post:
      description: 校验验证码
      parameters:
      - description: 验证码校验参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/request.CheckCaptcha'
      responses:
        "200":
          description: 成功
          schema:
            allOf:
            - $ref: '#/definitions/errcode.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/v1.Token'
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/errcode.ArgsErrorResponse'
      summary: 校验验证码
      tags:
      - 登录相关
